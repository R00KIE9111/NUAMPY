<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Personal - NUAMPY</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="encabezado_diseño">
        <div class="header_centro">
            <a href="{{ url_for('dashboard') }}" class="logo_link">
                <img class="logo" src="{{ url_for('static', filename='images/LogoNuamColor.png') }}" alt="Logo_Nuam">
            </a>
            <h2 style="color:white; margin:0 auto;">Configuración de Perfil</h2>
            <nav class="botones_nav">
                <a href="{{ url_for('dashboard') }}" class="btn_enviar">Volver al Dashboard</a>
            </nav>
        </div>
    </header>

    <div id="login_pagina" style="height: calc(100vh - 70px);">
        <form method="POST" action="{{ url_for('configuracion_perfil') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <h2>Mis Datos</h2>
            
            <label style="color:var(--text-muted); align-self:flex-start; font-size:0.8rem; margin-bottom:5px;">Nombre de Usuario (No modificable)</label>
            <input type="text" value="{{ usuario.nombre }}" disabled style="background-color:rgba(255,255,255,0.05); color:var(--text-muted);">
            
            <label style="color:var(--text-muted); align-self:flex-start; font-size:0.8rem; margin-bottom:5px;">Rol Actual (No modificable)</label>
            <input type="text" value="{{ usuario.rol }}" disabled style="background-color:rgba(255,255,255,0.05); color:var(--text-muted);">
            
            <label style="color:var(--text-muted); align-self:flex-start; font-size:0.8rem; margin-bottom:5px;">Correo Electrónico</label>
            <input type="email" name="correo" value="{{ usuario.correo }}" required>
            
            <label style="color:var(--text-muted); align-self:flex-start; font-size:0.8rem; margin-bottom:5px;">Nueva Contraseña (Dejar en blanco para mantener)</label>
            <input type="password" name="contraseña" placeholder="••••••••">
            
            <button type="submit">Actualizar Perfil</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
