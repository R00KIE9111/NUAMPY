<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body id = "login_pagina">
    <img class="logo" src="{{ url_for('static', filename='images/LogoNuamColor.png') }}" alt="Logo_Nuam">
    <form action="{{ url_for('login') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"> 
        <div class="login_datos">
            <label for="usuario"></label>
            <input type="text" id="usuario" name="usuario" placeholder="Ingresar tu usuario" required>

            <label for="contrasena"></label>
            <input type="password" id="contrasena" name="contraseña" placeholder="Ejemplo@hotmail.com" required>

            <button type="submit">Ingresar</button>

        </div>
        
    </form>
</body>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</html>
